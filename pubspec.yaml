name: wordpal
description: Dicionário inteligente de inglês para estudantes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Local storage
  sqflite: ^2.3.3+1
  shared_preferences: ^2.3.2
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # Audio playback
  audioplayers: ^6.1.0

  # Date formatting
  intl: ^0.20.2

  # Lottie animations
  lottie: ^3.3.3

  # Icons
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.6.4
  build_runner: ^2.15.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
